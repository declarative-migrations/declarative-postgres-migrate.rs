name: ci
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # weekly full cross-checker matrix

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: unit tests
        run: cargo test --lib
      - name: splitter property tests
        run: cargo test --test fuzz_splitter

  postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: PostgreSQL convergence tests
        env:
          DPM_TEST_DATABASE_URL: postgres://postgres@localhost:5432/postgres
        run: cargo test --test convergence -- --test-threads=4

  cli:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: CLI contracts and PostgreSQL lifecycle
        env:
          DPM_TEST_DATABASE_URL: postgres://postgres@localhost:5432/postgres
        run: cargo test --test cli -- --test-threads=1

  cockroach:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Start CockroachDB v25.2.4
        run: >-
          docker run --detach --name dpm-cockroach
          --publish 26257:26257 --publish 8080:8080
          cockroachdb/cockroach:v25.2.4 start-single-node --insecure
      - name: Wait for CockroachDB
        run: |
          for attempt in {1..60}; do
            if docker exec dpm-cockroach cockroach sql \
              --insecure --host=localhost:26257 --execute='SELECT 1' >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          docker logs dpm-cockroach
          exit 1
      - name: CockroachDB convergence and CLI tests
        env:
          DPM_TEST_COCKROACH_DATABASE_URL: postgresql://root@localhost:26257/defaultdb?sslmode=disable
        run: cargo test --test cockroach -- --test-threads=1
      - name: CockroachDB logs on failure
        if: failure()
        run: docker logs dpm-cockroach

  crosscheck-matrix:
    # The full 7-tool countersigning matrix: every fixture verified by
    # migra, pgdiff, atlas, pg-schema-diff, liquibase, apgdiff, and flyway.
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Install the seven cross-checkers
        run: |
          set -euo pipefail
          pipx install migra
          # schemainspect needs pkg_resources (removed in setuptools 81); the pg driver is an extra
          pipx inject migra 'setuptools<81' psycopg2-binary
          go install github.com/joncrlsn/pgdiff@latest
          go install github.com/stripe/pg-schema-diff/cmd/pg-schema-diff@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"
          curl -sSf https://atlasgo.sh | sh
          sudo apt-get update -qq && sudo apt-get install -y -qq apgdiff postgresql-client
          LB=4.32.0
          curl -fsSL -o /tmp/lb.tar.gz "https://github.com/liquibase/liquibase/releases/download/v${LB}/liquibase-${LB}.tar.gz"
          sudo mkdir -p /opt/liquibase && sudo tar -xzf /tmp/lb.tar.gz -C /opt/liquibase
          echo "/opt/liquibase" >> "$GITHUB_PATH"
          FW=11.8.2
          curl -fsSL -o /tmp/fw.tar.gz "https://repo1.maven.org/maven2/org/flywaydb/flyway-commandline/${FW}/flyway-commandline-${FW}-linux-x64.tar.gz"
          sudo tar -xzf /tmp/fw.tar.gz -C /opt
          echo "/opt/flyway-${FW}" >> "$GITHUB_PATH"
      - name: Verify all seven are present
        run: |
          set -euo pipefail
          for t in migra pgdiff atlas pg-schema-diff liquibase apgdiff flyway; do
            command -v "$t" || { echo "MISSING: $t"; exit 1; }
          done
      - name: Run the cross-checker matrix
        env:
          DPM_TEST_DATABASE_URL: postgres://postgres@localhost:5432/postgres
        run: cargo test --test convergence matrix_ -- --test-threads=4
