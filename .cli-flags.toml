# flags-2-env contract for dpm (github.com/ORESoftware/flags-2-env).
# Every CLI flag maps to an environment variable; precedence is
# CLI flag > process env > default declared here.

[help]
url = "https://github.com/ORESoftware/declarative-postgres-migrate.rs"
columns = ["options", "env", "type", "default", "description"]

[parse]
stop_at_first_positional = false
positionals_env = "FLAGS2ENV_POSITIONALS"

[flags.source]
env = "SOURCE_DATABASE_URL"
aliases = ["source", "from", "desired"]
short = "s"
type = "string"
help = "Desired state: postgres:// URL, catalog .json dump, or schema .sql file."

[flags.target]
env = "TARGET_DATABASE_URL"
aliases = ["target", "to", "current"]
short = "t"
type = "string"
help = "Current state to converge: postgres:// URL, .json, or .sql (diff-only). Falls back to DATABASE_URL."

[flags.source-sql]
env = "SOURCE_SQL_FILE"
aliases = ["source-sql", "from-sql"]
type = "string"
help = "Explicit .sql file as the desired state (pg_dump --schema-only output works). Overrides --source."

[flags.target-sql]
env = "TARGET_SQL_FILE"
aliases = ["target-sql", "to-sql"]
type = "string"
help = "Explicit .sql file as the current state (diff-only). Overrides --target."

[flags.source-json]
env = "SOURCE_CATALOG_JSON"
aliases = ["source-json", "from-json"]
type = "string"
help = "Explicit catalog .json dump as the desired state. Overrides --source."

[flags.target-json]
env = "TARGET_CATALOG_JSON"
aliases = ["target-json", "to-json"]
type = "string"
help = "Explicit catalog .json dump as the current state (diff-only). Overrides --target."

[flags.shadow]
env = "SHADOW_DATABASE_URL"
aliases = ["shadow", "shadow-url", "scratch"]
type = "string"
help = "Server URL where dpm may CREATE/DROP throwaway databases (needed for .sql sources and verify)."

[flags.schemas]
env = "DPM_SCHEMAS"
aliases = ["schemas"]
type = "string"
help = "Comma-separated schema list to diff. Default: all user schemas minus managed/system ones."

[flags.exclude-schemas]
env = "DPM_EXCLUDE_SCHEMAS"
aliases = ["exclude-schemas"]
type = "string"
help = "Comma-separated schemas to exclude on top of the built-in managed-service exclusions."

[flags.out]
env = "DPM_OUT"
aliases = ["out", "output"]
short = "o"
type = "string"
help = "Write the migration script (or JSON) to this path instead of stdout."

[flags.format]
env = "DPM_FORMAT"
aliases = ["format"]
type = "string"
default = "sql"
help = "Output format for diff: sql | json (machine-readable change plan for CI/AI review)."

[flags.allow-destructive-sql]
env = "DPM_ALLOW_DESTRUCTIVE_SQL"
aliases = ["allow-destructive-sql"]
type = "bool"
default = "false"
help = "GENERATE destructive statements (drops) live in the script instead of commented out."

[flags.allow-destructive-ops]
env = "DPM_ALLOW_DESTRUCTIVE_OPS"
aliases = ["allow-destructive-ops"]
type = "bool"
default = "false"
help = "EXECUTE destructive statements during `dpm apply`. Without it, apply refuses to run a script containing live destructive SQL."

[flags.allow-destructive]
env = "DPM_ALLOW_DESTRUCTIVE"
aliases = ["allow-destructive", "destructive"]
type = "bool"
default = "false"
help = "Legacy shorthand: implies both --allow-destructive-sql and --allow-destructive-ops."

[flags.yes]
env = "DPM_YES"
aliases = ["yes", "assume-yes"]
short = "y"
type = "bool"
default = "false"
help = "Skip the interactive confirmation before dpm apply executes SQL."

[flags.fail-on-diff]
env = "DPM_FAIL_ON_DIFF"
aliases = ["fail-on-diff", "exit-code"]
type = "bool"
default = "false"
help = "Exit 2 when differences exist (like git diff --exit-code; for CI gates)."

[flags.advise-fk-indexes]
env = "DPM_ADVISE_FK_INDEXES"
aliases = ["advise-fk-indexes"]
type = "bool"
default = "true"
help = "Append advisory comments for foreign keys lacking a supporting index."

[flags.external-check]
env = "DPM_EXTERNAL_CHECK"
aliases = ["external-check", "external-cmd"]
type = "string"
help = "Custom cross-validation command template, e.g. 'mytool {target} {source}'. Empty output + exit 0 = agreement."

[flags.cross-check-with-migra]
env = "DPM_CROSS_CHECK_MIGRA"
aliases = ["cross-check-with-migra", "cross-check-migra"]
type = "bool"
default = "false"
help = "After migrating, cross-check the result against the source with migra (must be installed; see scripts/install-crosscheckers.sh)."

[flags.cross-check-with-pgdiff]
env = "DPM_CROSS_CHECK_PGDIFF"
aliases = ["cross-check-with-pgdiff", "cross-check-pgdiff"]
type = "bool"
default = "false"
help = "After migrating, cross-check the result against the source with pgdiff (joncrlsn/pgdiff; see scripts/install-crosscheckers.sh)."

[flags.cross-check-with-atlas]
env = "DPM_CROSS_CHECK_ATLAS"
aliases = ["cross-check-with-atlas", "cross-check-atlas"]
type = "bool"
default = "false"
help = "Cross-check with atlas (ariga): `atlas schema diff` between migrated and source must be empty."

[flags.cross-check-with-pg-schema-diff]
env = "DPM_CROSS_CHECK_PG_SCHEMA_DIFF"
aliases = ["cross-check-with-pg-schema-diff", "cross-check-pg-schema-diff"]
type = "bool"
default = "false"
help = "Cross-check with stripe/pg-schema-diff: plan between migrated and source DSNs must be empty."

[flags.cross-check-with-liquibase]
env = "DPM_CROSS_CHECK_LIQUIBASE"
aliases = ["cross-check-with-liquibase", "cross-check-liquibase"]
type = "bool"
default = "false"
help = "Cross-check with liquibase diff: every Missing/Unexpected/Changed category must be NONE."

[flags.cross-check-with-apgdiff]
env = "DPM_CROSS_CHECK_APGDIFF"
aliases = ["cross-check-with-apgdiff", "cross-check-apgdiff"]
type = "bool"
default = "false"
help = "Cross-check with apgdiff: diff of pg_dump --schema-only outputs must be empty."

[flags.cross-check-with-flyway]
env = "DPM_CROSS_CHECK_FLYWAY"
aliases = ["cross-check-with-flyway", "cross-check-flyway"]
type = "bool"
default = "false"
help = "Runner validation (verify only): dpm's script must apply cleanly under flyway on a fresh target replica."

[flags.cross-check-all]
env = "DPM_CROSS_CHECK_ALL"
aliases = ["cross-check-all"]
type = "bool"
default = "false"
help = "Run every cross-checker that is installed (missing tools are skipped, not failed)."

[flags.cross-check-with-ai]
env = "DPM_CROSS_CHECK_AI"
aliases = ["cross-check-with-ai", "cross-check-ai"]
type = "bool"
default = "false"
help = "AI discrepancy scan over all cross-check reports: classifies residuals as real drift vs tool blind spots."

[flags.migra-bin]
env = "DPM_MIGRA_BIN"
aliases = ["migra-bin"]
type = "string"
default = "migra"
help = "Path/name of the migra binary."

[flags.pgdiff-bin]
env = "DPM_PGDIFF_BIN"
aliases = ["pgdiff-bin"]
type = "string"
default = "pgdiff"
help = "Path/name of the pgdiff binary."

[flags.atlas-bin]
env = "DPM_ATLAS_BIN"
aliases = ["atlas-bin"]
type = "string"
default = "atlas"
help = "Path/name of the atlas binary."

[flags.pg-schema-diff-bin]
env = "DPM_PG_SCHEMA_DIFF_BIN"
aliases = ["pg-schema-diff-bin"]
type = "string"
default = "pg-schema-diff"
help = "Path/name of the pg-schema-diff binary."

[flags.liquibase-bin]
env = "DPM_LIQUIBASE_BIN"
aliases = ["liquibase-bin"]
type = "string"
default = "liquibase"
help = "Path/name of the liquibase binary."

[flags.apgdiff-bin]
env = "DPM_APGDIFF_BIN"
aliases = ["apgdiff-bin"]
type = "string"
default = "apgdiff"
help = "Path/name of the apgdiff binary."

[flags.flyway-bin]
env = "DPM_FLYWAY_BIN"
aliases = ["flyway-bin"]
type = "string"
default = "flyway"
help = "Path/name of the flyway binary."

[flags.pg-dump-bin]
env = "DPM_PG_DUMP_BIN"
aliases = ["pg-dump-bin"]
type = "string"
default = "pg_dump"
help = "Path/name of pg_dump (used by the apgdiff cross-check)."

[flags.keep-shadow]
env = "DPM_KEEP_SHADOW"
aliases = ["keep-shadow"]
type = "bool"
default = "false"
help = "Keep throwaway shadow databases after verify/materialize (debugging)."

[flags.verbose]
env = "DPM_VERBOSE"
aliases = ["verbose"]
short = "v"
type = "bool"
default = "false"
help = "Verbose progress logging on stderr."

[flags.ai-review]
env = "DPM_AI_REVIEW"
aliases = ["ai-review", "ai"]
type = "bool"
default = "false"
help = "Send the generated migration to an AI tool for a correctness/consistency/safety review (see --ai-tool)."

[flags.ai-tool]
env = "DPM_AI_TOOL"
aliases = ["ai-tool"]
type = "string"
default = "claude"
help = "AI reviewer CLI: claude | codex | chatgpt | gemini | custom (custom uses --ai-cmd)."

[flags.ai-cmd]
env = "DPM_AI_CMD"
aliases = ["ai-cmd"]
type = "string"
help = "Custom AI review command template; {file} expands to the review-payload path, e.g. 'my-llm --prompt-file {file}'."

[flags.ai-transport]
env = "DPM_AI_TRANSPORT"
aliases = ["ai-transport"]
type = "string"
default = "auto"
help = "How to reach the AI reviewer: auto (API when the provider key env var is set, else CLI) | api | cli."

[flags.ai-model]
env = "DPM_AI_MODEL"
aliases = ["ai-model"]
type = "string"
help = "Model for the API transport (defaults: claude-opus-4-8 / gpt-5.1 / gemini-2.5-pro)."

[flags.ai-strict]
env = "DPM_AI_STRICT"
aliases = ["ai-strict"]
type = "bool"
default = "true"
help = "Treat an AI REJECT (or unparseable verdict) as blocking: apply aborts, diff/review/verify exit 4."

[env]
ignore = ["DATABASE_URL"]
